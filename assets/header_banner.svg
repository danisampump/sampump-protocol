<svg width="860" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0a1e"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" rx="14" fill="url(#bgGrad)"/>
  <rect width="860" height="200" rx="14" fill="url(#glow1)"/>
  <rect width="860" height="200" rx="14" fill="url(#glow2)"/>
  <rect width="860" height="200" rx="14" fill="none" stroke="#7c3aed" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Decorative dots -->
  <circle cx="60" cy="40" r="2" fill="#7c3aed" opacity="0.5"/>
  <circle cx="800" cy="160" r="2" fill="#2563eb" opacity="0.5"/>
  <circle cx="780" cy="40" r="1.5" fill="#a78bfa" opacity="0.4"/>
  <circle cx="80" cy="160" r="1.5" fill="#60a5fa" opacity="0.4"/>

  <!-- Title: SamPump Protocol -->
  <text x="430" y="90" font-family="'Segoe UI',system-ui,sans-serif" font-size="42" font-weight="800" fill="url(#titleGrad)" text-anchor="middle" letter-spacing="-1">SamPump Protocol</text>

  <!-- Tagline -->
  <text x="430" y="126" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" fill="#8b949e" text-anchor="middle">The first token launchpad on Solana where rug pulls are</text>
  <text x="430" y="147" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="700" fill="#e6edf3" text-anchor="middle">mathematically impossible.</text>

  <!-- Bottom accent line -->
  <line x1="300" y1="175" x2="560" y2="175" stroke="url(#titleGrad)" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Solana label -->
  <text x="430" y="193" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#484f58" text-anchor="middle" letter-spacing="2">BUILT ON SOLANA · MAINNET</text>
</svg>
